
services:
  postgres_test:
    image: postgres:15-alpine
    container_name: todos_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: todos_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todos_test_network

networks:
  todos_test_network:
    driver: bridge
