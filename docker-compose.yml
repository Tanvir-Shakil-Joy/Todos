version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: todos_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todos_network

  # Todos API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todos_api
    restart: always
    ports:
      - "${APP_PORT}:8080"
    environment:
      APP_ENV: ${APP_ENV}
      APP_PORT: 8080
      DB_HOST: postgres         # Use service name, not localhost
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todos_network

  # pgAdmin (optional - DB management UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: todos_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - todos_network

volumes:
  postgres_data:

networks:
  todos_network:
    driver: bridge
